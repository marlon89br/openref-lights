services:
  # Backend service - NestJS with WebSocket
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: openref-backend
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    environment:
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
    restart: unless-stopped
    networks:
      - openref-network
    volumes:
      - openref-data:/app/backend/data
    healthcheck:
      # node:20-alpine's production stage has neither curl nor wget; use node's
      # built-in http client against the socket.io handshake path (root path 404s).
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/socket.io/?EIO=4&transport=polling', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend service - Angular served with nginx
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}
        FRONTEND_URL: ${FRONTEND_URL:-}
        FRONTEND_DEBUG: ${FRONTEND_DEBUG:-false}
      secrets:
        - auth_token
    container_name: openref-frontend
    ports:
      - '${FRONTEND_PORT:-8080}:80'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - openref-network
    healthcheck:
      # localhost resolves to ::1 first on Alpine/musl and nginx isn't listening on IPv6 -> refused
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1']
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  openref-network:
    driver: bridge

volumes:
  # Persists the decision log (backend/data/decision-log.jsonl) across container recreations.
  openref-data:

secrets:
  auth_token:
    environment: AUTH_TOKEN

